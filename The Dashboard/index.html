<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonio Luna's Dashboard - SUT25</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/9ea2f0edb9.js" crossorigin="anonymous"></script>

  </head>
  <body>
    <header class="header">
      <div class="date-pill">
        <strong><span id="time"></span></strong>
        <span id="date"></span>
      </div>
    </header>
    <main>
      <div class="title row">
        <h1 id="dashboard-title" contenteditable="false">
          Antonio's Dashboard
        </h1>

      </div>
      <article class="content">
        <div class="col-1 left">
         <section id="bookmarks" class="dashboard-box">
  <h2>Bookmarks 🔖</h2>
  <div id="bookmarks-list"></div>

  <button type="button" id="open-bookmark-modal">Add 🔖</button>
</section>
          <section id="weather" class="dashboard-box">
            <h2>Daily Weather 🌡️</h2>
            <div id="weather-widget">Loading weather...</div>
          </section>
        </div>

        <div class="col-2 right">
          <section id="crypto" class="dashboard-box">
            <h2>Crypto 📈</h2>
            <div id="crypto-widget">
            </div>
          </section>
          <section id="notes" class="dashboard-box">
            <h2>Notes 📝</h2>
            <textarea
              id="notes-text"
              placeholder="Write your notes here..."
            ></textarea>
          </section>
        </div>
      </article>
    </main>
    <footer class="footer">
      <button id="change-bg-button" type="button">
  <i class="fas fa-arrow-rotate-right" id="change-bg-icon" alt="Change Background"></i>
  <span id="change-bg-label">Change BG</span>
</button>
    </footer>
<dialog id="bookmark-modal">
  <div class="bookmark-modal-content">
    <button type="button" id="close-bookmark-modal" class="close-modal-btn">×</button>
    <h3>Add bookmark</h3>

    <form id="bookmark-form">
      <input type="text" id="bookmark-title" placeholder="Site title" />
      <input type="url" id="bookmark-url" placeholder="Site URL" />
      <button type="submit">Save link</button>
    </form>
  </div>
</dialog>
  </body>
</html>
