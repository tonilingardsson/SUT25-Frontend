<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonio Luna's Dashboard - SUT25</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/9ea2f0edb9.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div>
        <h3>
          Day: <span id="date"></span> | Time:
          <span id="time"></span>
        </h3>
      </div>
      <!-- Dark mode toggle button -->
      <button class="button dark-mode-toggle" id="darkModeToggle">
        <i class="fas fa-moon" id="theme-icon"></i>
        <span id="theme-label">
          Dark Mode
        </span>
      </button>
      <!-- Not necessary for this version -->
      <!-- <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav> -->
    </header>
    <main>
      <div class="title row">
        <h1 class="content title" id="dashboard-title" contenteditable="false">
          Antonio's Dashboard
        </h1>
        
        <button class="button" id="dashboard-title-btn">
          <i class="fas fa-edit"></i>
          <span id="title-btn-label">Edit</span>
        </button>
        
        <button id="change-bg-button">
          <i class="fas fa-recycle"></i>
          <span>
            Change BG
          </span>
        </button>
      </div>
      <article class="content">
        <div class="col-1 left">
          <section id="bookmarks" class="dashboard-box">
            <h2>Bookmarks 🔖</h2>
            <div id="bookmarks-list"></div>
            <form id="bookmark-form">
              <input type="text" id="bookmark-title" placeholder="Site title" />
              <input type="url" id="bookmark-url" placeholder="Site URL" />
              <button type="submit">Add 🔖</button>
            </form>
          </section>
          <section id="weather" class="dashboard-box">
            <h2>Daily Weather 🌡️</h2>
            <div id="weather-widget">Loading weather...</div>
          </section>
        </div>

        <div class="col-2 right">
          <section id="crypto" class="dashboard-box">
            <h2>Crypto 📈</h2>
            <div id="crypto-widget">
            </div>
          </section>
          <section id="notes" class="dashboard-box">
            <h2>Notes 📝</h2>
            <textarea
              id="notes-text"
              placeholder="Write your notes here..."
            ></textarea>
          </section>
        </div>
      </article>
    </main>
    <footer class="footer">
      <!-- Not necessary for this version -->
      <!-- <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul> -->
      <p>Copyright © 2026 Antonio Luna</p>
    </footer>
  </body>
</html>
